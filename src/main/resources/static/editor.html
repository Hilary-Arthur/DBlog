<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写博客 - DBlog</title>
  <style>
    :root {
      --primary: #1e293b; --accent: #0ea5e9; --bg: #f8fafc; --card-bg: #fff;
      --text: #1e293b; --text-secondary: #64748b; --border: #e2e8f0; --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .navbar { background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .navbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; }
    .nav-left { display: flex; align-items: center; gap: 28px; }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); text-decoration: none; letter-spacing: -.3px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a { text-decoration: none; color: var(--text-secondary); padding: 6px 14px; border-radius: 6px; font-size: 0.88rem; transition: all .15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); background: #f1f5f9; }
    .nav-right { display: flex; align-items: center; gap: 16px; position: relative; }
    .user-area { position: relative; }
    .user-trigger { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background .15s; }
    .user-trigger:hover { background: #f1f5f9; }
    .avatar { width: 32px; height: 32px; border-radius: 6px; background: #334155; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.82rem; }
    .username { font-size: 0.88rem; font-weight: 500; }
    .arrow { font-size: 0.6rem; color: var(--text-secondary); transition: transform .2s; }
    .user-trigger.open .arrow { transform: rotate(180deg); }
    .dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,.1); min-width: 160px; padding: 6px; display: none; z-index: 200; }
    .dropdown.show { display: block; }
    .dropdown-item { display: block; width: 100%; padding: 9px 14px; border: none; background: none; text-align: left; font-size: 0.88rem; color: var(--text); border-radius: 6px; cursor: pointer; transition: background .1s; text-decoration: none; }
    .dropdown-item:hover { background: #f1f5f9; }
    .dropdown-item.danger { color: #dc2626; }
    .btn-login { background: var(--primary); color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .editor-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
    .editor-card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 22px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .form-group input,
    .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 0.92rem; outline: none; font-family: inherit; transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,233,.12); }
    .form-group textarea { resize: vertical; min-height: 360px; line-height: 1.7; }
    .form-group .char-count { text-align: right; font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }

    .btn-row { display: flex; gap: 10px; margin-top: 24px; }
    .btn-publish { padding: 10px 28px; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-publish:hover { background: #0f172a; }
    .btn-draft { padding: 10px 28px; border: 1px solid var(--border); background: #fff; border-radius: 6px; font-size: 0.92rem; cursor: pointer; color: var(--text-secondary); }
    .btn-draft:hover { border-color: var(--text-secondary); }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #059669; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 0.88rem; z-index: 500; display: none; }
    .toast.error { background: #dc2626; }

    /* 模态框 */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 300;
      display: flex; align-items: center; justify-content: center; display: none;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; width: 400px; max-width: 94vw;
      box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 0;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border: none; background: #f1f5f9;
      border-radius: 8px; font-size: 1rem; cursor: pointer; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #e2e8f0; }
    .modal-body { padding: 20px 24px 24px; }
    .modal-body .msg { font-size: 0.95rem; color: var(--text); margin-bottom: 18px; text-align: center; }
    .modal-actions { display: flex; gap: 10px; }
    .btn-primary { flex: 1; padding: 10px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #0f172a; }
    .btn-secondary { flex: 1; padding: 10px; background: #fff; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
    .btn-secondary:hover { background: #f1f5f9; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: var(--text); }
    .form-group input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; outline: none; transition: border-color .15s;
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,233,.12); }
    .form-error { color: #dc2626; font-size: 0.8rem; margin-bottom: 8px; display: none; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <div class="nav-left">
        <a href="/" class="logo">DBlog</a>
        <div class="nav-links">
          <a href="/">首页</a>
          <a href="#">技术</a>
          <a href="#">随笔</a>
          <a href="#">关于</a>
        </div>
      </div>
      <div class="nav-right">
        <div class="user-area" id="userArea" style="display:none">
          <div class="user-trigger" id="userTrigger">
            <div class="avatar" id="avatarLetter">H</div>
            <span class="username" id="displayName">Hilary</span>
            <span class="arrow">▼</span>
          </div>
          <div class="dropdown" id="dropdown">
            <a href="/profile.html" class="dropdown-item">个人主页</a>
            <hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">
            <button class="dropdown-item danger" id="btnLogout">退出登录</button>
          </div>
        </div>
        <button class="btn-login" id="btnLogin" style="display:none">登录</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="editor-card">
      <h2>写文章</h2>
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="titleInput" placeholder="输入文章标题" maxlength="200">
        <div class="char-count"><span id="titleCount">0</span>/200</div>
      </div>
      <div class="form-group">
        <label>内容</label>
        <textarea id="contentInput" placeholder="写点什么..."></textarea>
        <div class="char-count"><span id="contentCount">0</span> 字</div>
      </div>
      <div class="btn-row">
        <button class="btn-publish" id="btnPublish">发布</button>
      </div>
    </div>
  </div>

  <!-- 未登录提示弹窗 -->
  <div class="modal-overlay" id="loginRequiredOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>提示</h2>
        <button class="modal-close" id="loginRequiredClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="msg">写文章请先登录</div>
        <div class="modal-actions">
          <button class="btn-secondary" id="goHomeBtn">返回首页</button>
          <button class="btn-primary" id="goLoginBtn">登录</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 登录弹窗 -->
  <div class="modal-overlay" id="loginOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>登录</h2>
        <button class="modal-close" id="loginClose">✕</button>
      </div>
      <div class="modal-body">
        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label>账号</label>
            <input type="text" id="loginAccount" placeholder="请输入账号" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" required>
          </div>
          <div class="form-error" id="loginError"></div>
          <button type="submit" class="btn-primary" style="margin-top:4px;">登 录</button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var userArea = document.getElementById('userArea');
    var btnLogin = document.getElementById('btnLogin');
    var avatarLetter = document.getElementById('avatarLetter');
    var displayName = document.getElementById('displayName');
    var dropdown = document.getElementById('dropdown');

    fetch('/api/user/me').then(function(r) { return r.json(); }).then(function(data) {
      if (data.loggedIn) { setLoggedIn(data.account); }
      else { document.getElementById('loginRequiredOverlay').classList.add('show'); }
    });

    function setLoggedIn(account) {
      userArea.style.display = 'block'; btnLogin.style.display = 'none';
      avatarLetter.textContent = account.charAt(0).toUpperCase();
      displayName.textContent = account;
    }

    document.getElementById('userTrigger').addEventListener('click', function(e) {
      e.stopPropagation(); dropdown.classList.toggle('show'); this.classList.toggle('open');
    });
    document.addEventListener('click', function() { dropdown.classList.remove('show'); document.getElementById('userTrigger').classList.remove('open'); });
    document.getElementById('btnLogout').addEventListener('click', function() {
      fetch('/api/logout', { method: 'POST' }).then(function() { window.location.href = '/'; });
    });

    // ── 未登录弹窗 ──
    document.getElementById('loginRequiredClose').addEventListener('click', function() {
      window.location.href = '/';
    });
    document.getElementById('goHomeBtn').addEventListener('click', function() {
      window.location.href = '/';
    });
    document.getElementById('goLoginBtn').addEventListener('click', function() {
      document.getElementById('loginRequiredOverlay').classList.remove('show');
      document.getElementById('loginOverlay').classList.add('show');
    });

    // ── 登录弹窗 ──
    document.getElementById('loginClose').addEventListener('click', function() {
      document.getElementById('loginOverlay').classList.remove('show');
      document.getElementById('loginRequiredOverlay').classList.add('show');
    });
    document.getElementById('loginOverlay').addEventListener('click', function(e) {
      if (e.target === this) { this.classList.remove('show'); document.getElementById('loginRequiredOverlay').classList.add('show'); }
    });
    document.getElementById('loginRequiredOverlay').addEventListener('click', function(e) {
      if (e.target === this) { window.location.href = '/'; }
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var err = document.getElementById('loginError');
      err.style.display = 'none';
      var account = document.getElementById('loginAccount').value.trim();
      var password = document.getElementById('loginPassword').value;
      if (!account || !password) { err.textContent = '请填写账号和密码'; err.style.display = 'block'; return; }

      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ account: account, password: password })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          document.getElementById('loginOverlay').classList.remove('show');
          setLoggedIn(data.account);
        } else {
          err.textContent = data.msg;
          err.style.display = 'block';
        }
      });
    });

    // ── 字数统计 ──
    var titleInput = document.getElementById('titleInput');
    var contentInput = document.getElementById('contentInput');
    titleInput.addEventListener('input', function() {
      document.getElementById('titleCount').textContent = this.value.length;
    });
    contentInput.addEventListener('input', function() {
      document.getElementById('contentCount').textContent = this.value.length;
    });

    // ── 发布 ──
    document.getElementById('btnPublish').addEventListener('click', function() {
      var title = titleInput.value.trim();
      var content = contentInput.value.trim();
      if (!title) { showToast('请输入标题', true); return; }
      if (!content) { showToast('请输入内容', true); return; }

      var btn = this;
      btn.disabled = true;
      btn.textContent = '发布中...';

      fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: title, content: content })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          showToast(data.msg || '已提交审核，通过后可见');
          setTimeout(function() { window.location.href = '/'; }, 1000);
        } else {
          showToast(data.msg, true);
          btn.disabled = false;
          btn.textContent = '发布';
        }
      })
      .catch(function() {
        showToast('网络错误', true);
        btn.disabled = false;
        btn.textContent = '发布';
      });
    });

    function showToast(msg, isError) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '');
      t.style.display = 'block';
      setTimeout(function() { t.style.display = 'none'; }, 2000);
    }
  </script>

</body>
</html>
