<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写博客 - DBlog</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DBlog 自定义 -->
  <link href="/css/editor.css" rel="stylesheet">
</head>
<body>

<div id="app">

  <!-- ═══ 顶部导航 ═══ -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-xl px-3">
      <a class="navbar-brand fs-5" href="/">DBlog</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navLinks">
        <ul class="navbar-nav me-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">写博客</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <div class="dropdown" v-if="loggedIn">
            <div class="d-flex align-items-center gap-2 user-dropdown px-2 py-1 rounded-2"
                 data-bs-toggle="dropdown" aria-expanded="false">
              <div class="avatar-sm">{{ avatarLetter }}</div>
              <span class="d-none d-md-inline" style="font-size:0.88rem;font-weight:500;">{{ account }}</span>
            </div>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/profile.html">个人主页</a></li>
              <li><hr class="dropdown-divider my-1"></li>
              <li><button class="dropdown-item text-danger" @click="doLogout">退出登录</button></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ═══ 编辑器 ═══ -->
  <div class="container-xl px-3 py-4">
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <div class="editor-card">
          <h2 class="fs-5 fw-bold mb-4">写文章</h2>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:0.85rem;">标题</label>
            <input type="text" class="form-control" v-model="title" placeholder="输入文章标题" maxlength="200">
            <div class="char-count">{{ titleCount }}/200</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:0.85rem;">内容</label>
            <textarea class="form-control" v-model="content" placeholder="写点什么..."></textarea>
            <div class="char-count">{{ contentCount }} 字</div>
          </div>
          <button class="btn btn-dark fw-semibold px-4" @click="publish" :disabled="publishing">
            {{ publishing ? '发布中...' : '发布' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Toast ═══ -->
  <div v-if="toastVisible" class="position-fixed top-0 start-50 translate-middle-x mt-3 z-3"
       :class="toastError ? 'bg-danger' : 'bg-success'"
       style="color:#fff;padding:10px 24px;border-radius:8px;font-size:0.88rem;box-shadow:0 4px 16px rgba(0,0,0,.15);">
    {{ toastMsg }}
  </div>

  <!-- ═══ 未登录提示弹窗 ═══ -->
  <div v-if="showLoginRequired" class="modal-backdrop fade show" @click="window.location.href='/'"></div>
  <div class="modal fade" :class="{ 'show d-block': showLoginRequired }" tabindex="-1" @click.self="window.location.href='/'">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 rounded-4 shadow-lg">
        <div class="modal-header border-0 px-4 pt-4">
          <h2 class="modal-title fs-5 fw-bold">提示</h2>
          <button type="button" class="btn-close" @click="window.location.href='/'"></button>
        </div>
        <div class="modal-body px-4 pb-4">
          <p class="text-center mb-4" style="font-size:0.95rem;">写文章请先登录</p>
          <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary flex-grow-1">返回首页</a>
            <button class="btn btn-dark flex-grow-1 fw-semibold" @click="openLogin">登录</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 登录弹窗 ═══ -->
  <div class="modal fade" :class="{ 'show d-block': showLoginModal }" tabindex="-1" @click.self="backToLoginRequired">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 rounded-4 shadow-lg">
        <div class="modal-header border-0 px-4 pt-4">
          <h2 class="modal-title fs-5 fw-bold">登录</h2>
          <button type="button" class="btn-close" @click="backToLoginRequired"></button>
        </div>
        <div class="modal-body px-4 pb-4">
          <form @submit.prevent="doLogin" autocomplete="off">
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.85rem;">账号</label>
              <input type="text" class="form-control" v-model="loginAccount" placeholder="请输入账号" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.85rem;">密码</label>
              <input type="password" class="form-control" v-model="loginPassword" placeholder="请输入密码" required>
            </div>
            <div v-if="loginError" class="text-danger mb-3" style="font-size:0.8rem;">{{ loginError }}</div>
            <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">登 录</button>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<!-- DBlog 编辑器逻辑 -->
<script src="/js/editor.js"></script>

</body>
</html>
