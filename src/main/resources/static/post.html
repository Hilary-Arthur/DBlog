<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - 星码记</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9733;</text></svg>">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Prism.js 代码高亮 -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <!-- 星码记 自定义 -->
  <link href="/css/index.css" rel="stylesheet">
  <link href="/css/post.css" rel="stylesheet">
  <!-- 星码记 主题切换（尽早加载防止闪烁） -->
  <script src="/js/theme.js"></script>
</head>
<body>

<!-- ═══ 顶部导航 ═══ -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-xl px-3">
    <a class="navbar-brand" href="/">
      <span class="brand-icon">&#9733;</span> 星码记
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
        <li class="nav-item"><a class="nav-link" href="/posts.html">所有文章</a></li>
        <li class="nav-item dropdown nav-dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">课程作业</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/course.html?name=操作系统原理">操作系统原理</a></li>
            <li><a class="dropdown-item" href="/course.html?name=计算机网络">计算机网络</a></li>
            <li><a class="dropdown-item" href="/course.html?name=数据库组成原理">数据库组成原理</a></li>
          </ul>
        </li>
      </ul>
      <button class="theme-toggle" id="themeToggle" title="切换主题">
        <i class="bi bi-sun" id="themeSun"></i>
        <i class="bi bi-moon" id="themeMoon" style="display:none;"></i>
      </button>
      <div class="search-box" id="searchBox">
        <button class="search-toggle" id="searchToggle"><i class="bi bi-search"></i></button>
        <form class="search-form" id="searchForm" onsubmit="return false;">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索文章..." autocomplete="off">
        </form>
      </div>
    </div>
  </div>
</nav>

<div id="app">

  <!-- ═══ 主体 ═══ -->
  <div class="container-xl px-3 py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <!-- 加载中 -->
        <div v-if="loading" class="text-center text-secondary py-5">加载中...</div>

        <!-- 文章不存在 -->
        <div v-else-if="notFound" class="text-center py-5">
          <p class="text-secondary mb-3">文章不存在</p>
          <a href="/" class="btn btn-outline-secondary btn-sm">返回首页</a>
        </div>

        <!-- 文章内容 -->
        <article v-else class="post-detail">
          <div class="post-head">
            <h1>{{ post.title }}</h1>
            <div class="post-meta d-flex align-items-center gap-2">
              <span>{{ post.createdAt }}</span>
              <span class="meta-dot"></span>
              <span><i class="bi bi-clock"></i> {{ readingTime }}</span>
            </div>
          </div>

          <div class="post-body" v-html="renderedContent"></div>

          <div class="post-footer">
            <a href="/" class="back-link">&larr; 返回首页</a>
          </div>
        </article>

      </div>

      <!-- 右侧目录导航 -->
      <div class="col-lg-4 d-none d-lg-block" v-if="tocItems.length">
        <aside class="toc-sidebar">
          <h4 class="toc-sidebar-title"><i class="bi bi-list-nested"></i> 目录</h4>
          <nav class="toc-list">
            <a v-for="t in tocItems" :key="t.id" :href="'#'+t.id"
               :class="['toc-link', 'toc-level-'+t.level, {active: activeId===t.id}]"
               @click.prevent="scrollTo(t.id)">{{ t.text }}</a>
          </nav>
        </aside>
      </div>
    </div>

    <!-- 推荐文章（文章下方） -->
    <div v-if="recommended.length" class="recommend-section">
      <h4 class="recommend-section-title"><i class="bi bi-stars"></i> 推荐文章</h4>
      <div class="row g-3">
        <div v-for="r in recommended" :key="r.hash" class="col-md-4">
          <a :href="'/p/' + r.hash" class="recommend-card">
            <div class="recommend-card-title">{{ r.title }}</div>
            <div class="recommend-card-meta">{{ r.createdAt }}</div>
            <div class="recommend-card-snippet">{{ r.snippet }}</div>
          </a>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- 回到顶部按钮 -->
<button class="back-to-top" id="backToTop" title="回到顶部">
  <i class="bi bi-arrow-up"></i>
</button>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<!-- Prism.js 代码高亮 -->
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
<!-- 星码记 文章详情逻辑 -->
<script src="/js/post.js"></script>
<!-- 星码记 代码复制 -->
<script src="/js/code-highlight.js"></script>
<!-- 星码记 搜索交互 -->
<script src="/js/search.js"></script>

<div class="icp-footer">
  <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">蜀ICP备2026025849号</a>
</div>

</body>
</html>
