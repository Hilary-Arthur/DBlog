<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统维护中 - DBlog</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DBlog 自定义 -->
  <link href="/css/maintenance.css" rel="stylesheet">
</head>
<body class="d-flex flex-column">

<div id="app" class="d-flex flex-column flex-grow-1">

  <!-- ═══ 维护提示 ═══ -->
  <main class="d-flex align-items-center justify-content-center flex-grow-1">
    <div class="text-center px-3" style="max-width:480px;">
      <div class="maint-icon">&#128736;</div>
      <h1 class="fs-4 fw-bold mb-2">系统维护中</h1>
      <p class="text-secondary mb-4" style="font-size:0.92rem;line-height:1.7;">
        网站正在维护，请稍后再访问。<br>如有疑问请联系管理员。
      </p>
    </div>
  </main>

  <!-- ═══ 页脚（含隐藏管理入口） ═══ -->
  <footer class="text-center py-3 flex-shrink-0" style="font-size:0.78rem;color:var(--dblog-text-secondary);">
    &copy; 2026 DBlog<span class="admin-dot" @click="openAdmin" title=""></span>
  </footer>

  <!-- ═══ 管理员登录弹窗 ═══ -->
  <div v-if="showAdminModal" class="modal-backdrop fade show" @click="closeAdmin"></div>

  <div class="modal fade" :class="{ 'show d-block': showAdminModal }" tabindex="-1" @click.self="closeAdmin">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 rounded-4 shadow-lg">
        <div class="modal-header border-0 px-4 pt-4">
          <h2 class="modal-title fs-5 fw-bold">管理员登录</h2>
          <button type="button" class="btn-close" @click="closeAdmin"></button>
        </div>
        <div class="modal-body px-4 pb-4">
          <form @submit.prevent="doAdminLogin" autocomplete="off">
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.85rem;">管理员账号</label>
              <input type="text" class="form-control" v-model="adminAccount" placeholder="请输入管理员账号" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.85rem;">密码</label>
              <input type="password" class="form-control" v-model="adminPassword" placeholder="请输入密码" required>
            </div>
            <div v-if="adminError" class="text-danger mb-3" style="font-size:0.8rem;">{{ adminError }}</div>
            <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">登 录</button>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<!-- DBlog 维护页逻辑 -->
<script src="/js/maintenance.js"></script>

</body>
</html>
