<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星码记 - 博客</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9733;</text></svg>">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- 星码记 自定义 -->
  <link href="/css/index.css" rel="stylesheet">
  <!-- 星码记 通用博客卡片 -->
  <link href="/css/post-card.css" rel="stylesheet">
  <!-- 星码记 主题切换（尽早加载防止闪烁） -->
  <script src="/js/theme.js"></script>
</head>
<body>

<!-- ═══ 顶部导航 ═══ -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-xl px-3">
    <a class="navbar-brand" href="/">
      <span class="brand-icon">&#9733;</span> 星码记
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link active" href="/">首页</a></li>
        <li class="nav-item"><a class="nav-link" href="/posts.html">所有文章</a></li>
      </ul>
      <button class="theme-toggle" id="themeToggle" title="切换主题">
        <i class="bi bi-sun" id="themeSun"></i>
        <i class="bi bi-moon" id="themeMoon" style="display:none;"></i>
      </button>
      <div class="search-box" id="searchBox">
        <button class="search-toggle" id="searchToggle"><i class="bi bi-search"></i></button>
        <form class="search-form" id="searchForm" onsubmit="return false;">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索文章..." autocomplete="off">
        </form>
      </div>
    </div>
  </div>
</nav>

<div id="app">

  <!-- ═══ 主体 ═══ -->
  <div class="container-xl px-3 py-4">
    <div class="post-list-wrapper">
      <div class="section-header mb-3">
        <h2 class="section-title">推荐文章</h2>
      </div>

      <!-- 加载中 -->
      <div v-if="loading" class="text-center text-secondary py-5">加载中...</div>

      <!-- 空状态 -->
      <div v-else-if="posts.length === 0" class="text-center text-secondary py-5">
        还没有文章
      </div>

      <!-- 文章列表 -->
      <div v-else class="post-list">
        <post-card v-for="(p, idx) in posts" :key="p.pid" :post="p"></post-card>
      </div>
    </div>
  </div>

  <!-- ═══ 页脚 ═══ -->
  <footer class="text-center py-3" style="font-size:0.78rem;color:var(--dblog-text-secondary);">
    &copy; 2026 星码记
  </footer>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<!-- 星码记 通用博客卡片组件 -->
<script src="/js/post-card.js"></script>
<!-- 星码记 首页逻辑 -->
<script src="/js/index.js"></script>
<!-- 星码记 搜索交互 -->
<script src="/js/search.js"></script>

<div class="icp-footer">
  <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">蜀ICP备2026025849号</a>
</div>

</body>
</html>
