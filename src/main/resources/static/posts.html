<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>所有文章 - 星码记</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9733;</text></svg>">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- 星码记 自定义 -->
  <link href="/css/index.css" rel="stylesheet">
  <!-- 星码记 通用博客卡片 -->
  <link href="/css/post-card.css" rel="stylesheet">
  <!-- 星码记 主题切换（尽早加载防止闪烁） -->
  <script src="/js/theme.js"></script>
</head>
<body>

<!-- ═══ 顶部导航 ═══ -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-xl px-3">
    <a class="navbar-brand" href="/">
      <span class="brand-icon">&#9733;</span> 星码记
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
        <li class="nav-item"><a class="nav-link active" href="/posts.html">所有文章</a></li>
      </ul>
      <button class="theme-toggle" id="themeToggle" title="切换主题">
        <i class="bi bi-sun" id="themeSun"></i>
        <i class="bi bi-moon" id="themeMoon" style="display:none;"></i>
      </button>
      <div class="search-box" id="searchBox">
        <button class="search-toggle" id="searchToggle"><i class="bi bi-search"></i></button>
        <form class="search-form" id="searchForm" onsubmit="return false;">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索文章..." autocomplete="off">
        </form>
      </div>
    </div>
  </div>
</nav>

<div id="app">

  <!-- ═══ 主体 ═══ -->
  <div class="container-xl px-3 py-4">
    <div class="row g-4">
      <!-- 文章列表 -->
      <main class="col-lg-9">
        <div class="section-header mb-3">
          <h2 class="section-title">{{ pageTitle }}</h2>
          <span class="text-secondary" style="font-size:0.85rem;" v-if="totalCount > 0">共 {{ totalCount }} 篇</span>
        </div>

        <!-- 加载中 -->
        <div v-if="loading" class="text-center text-secondary py-5">加载中...</div>

        <!-- 空状态 -->
        <div v-else-if="posts.length === 0" class="text-center text-secondary py-5">
          还没有文章
        </div>

        <!-- 文章列表 -->
        <div v-else class="post-list">
          <post-card v-for="(p, idx) in posts" :key="p.pid" :post="p"></post-card>
        </div>

        <!-- 分页 -->
        <nav v-if="showPagination" class="mt-4">
          <ul class="pagination justify-content-center align-items-center">
            <li class="page-item" :class="{ disabled: currentPage <= 1 }">
              <a class="page-link" href="#" @click.prevent="currentPage > 1 && loadPosts(currentPage - 1)"><i class="bi bi-chevron-left"></i></a>
            </li>
            <li v-for="p in pageNumbers" :key="p" class="page-item" :class="{ active: p === currentPage }">
              <a class="page-link" href="#" @click.prevent="loadPosts(p)">{{ p }}</a>
            </li>
            <li class="page-item" :class="{ disabled: currentPage >= totalPages }">
              <a class="page-link" href="#" @click.prevent="currentPage < totalPages && loadPosts(currentPage + 1)"><i class="bi bi-chevron-right"></i></a>
            </li>
            <li class="page-item disabled border-0"><span class="page-info">共 {{ totalPages }} 页</span></li>
          </ul>
        </nav>
      </main>

      <!-- 侧栏：月份筛选 -->
      <aside class="col-lg-3">
        <div class="sidebar-card">
          <h3 class="sidebar-title mb-3">按时间筛选</h3>
          <ul class="list-unstyled mb-0 month-list">
            <li v-if="archives.length === 0" style="color:var(--dblog-text-secondary);font-size:0.88rem;">暂无文章</li>
            <li v-for="m in archives" :key="m.month"
                :class="{ active: activeMonth === m.month }"
                @click="toggleMonth(m.month)">
              <span class="month-label">{{ m.label }}</span>
              <span class="month-count">{{ m.count }}</span>
            </li>
          </ul>
          <div v-if="activeMonth" class="mt-3">
            <button class="btn btn-sm btn-outline-secondary w-100 rounded-3" @click="clearFilter">
              <i class="bi bi-x-lg"></i> 清除筛选
            </button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- ═══ 页脚 ═══ -->
  <footer class="text-center py-3" style="font-size:0.78rem;color:var(--dblog-text-secondary);">
    &copy; 2026 星码记
  </footer>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<!-- 星码记 通用博客卡片组件 -->
<script src="/js/post-card.js"></script>
<!-- 星码记 所有文章逻辑 -->
<script src="/js/posts.js"></script>
<!-- 星码记 搜索交互 -->
<script src="/js/search.js"></script>

<div class="icp-footer">
  <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">蜀ICP备2026025849号</a>
</div>

</body>
</html>
