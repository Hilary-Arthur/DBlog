<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人主页 - DBlog</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DBlog 自定义 -->
  <link href="/css/profile.css" rel="stylesheet">
  <!-- DBlog 通用博客卡片 -->
  <link href="/css/post-card.css" rel="stylesheet">
</head>
<body>

<div id="app">

  <!-- ═══ 顶部导航 ═══ -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-xl px-3">
      <a class="navbar-brand fs-5" href="/">DBlog</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navLinks">
        <ul class="navbar-nav me-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
          <li class="nav-item"><a class="nav-link active" href="/profile.html">个人主页</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <div class="dropdown" v-if="loggedIn">
            <div class="d-flex align-items-center gap-2 user-dropdown px-2 py-1 rounded-2"
                 data-bs-toggle="dropdown" aria-expanded="false">
              <div class="avatar-sm">{{ avatarLetter }}</div>
              <span class="d-none d-md-inline" style="font-size:0.88rem;font-weight:500;">{{ account }}</span>
            </div>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/profile.html">个人主页</a></li>
              <li><hr class="dropdown-divider my-1"></li>
              <li><button class="dropdown-item text-danger" @click="doLogout">退出登录</button></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ═══ 主体 ═══ -->
  <div class="container-xl px-3 py-4">
    <div class="row justify-content-center">
      <div class="col-lg-9">

        <!-- 个人资料 -->
        <div class="profile-card mb-4">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <h2 class="fs-5 fw-bold mb-0">个人资料</h2>
            <button class="btn btn-sm" :class="editing ? 'btn-outline-secondary' : 'btn-outline-primary'" @click="toggleEdit">
              {{ editing ? '取消编辑' : '编辑' }}
            </button>
          </div>
          <div class="row g-3">
            <div class="col-sm-6">
              <label class="form-label" style="font-size:0.78rem;color:var(--dblog-text-secondary);">账号</label>
              <div v-if="!editing" class="py-2" style="font-size:0.95rem;">{{ account }}</div>
              <input v-else type="text" class="form-control" :value="account" disabled>
            </div>
            <div class="col-sm-6">
              <label class="form-label" style="font-size:0.78rem;color:var(--dblog-text-secondary);">昵称</label>
              <div v-if="!editing" class="py-2" style="font-size:0.95rem;">{{ profile.uname || '-' }}</div>
              <input v-else type="text" class="form-control" v-model="editForm.uname" placeholder="输入昵称">
            </div>
            <div class="col-sm-6">
              <label class="form-label" style="font-size:0.78rem;color:var(--dblog-text-secondary);">手机号码</label>
              <div v-if="!editing" class="py-2" style="font-size:0.95rem;">{{ profile.tel || '-' }}</div>
              <input v-else type="text" class="form-control" v-model="editForm.tel" placeholder="输入手机号码">
            </div>
            <div class="col-sm-6">
              <label class="form-label" style="font-size:0.78rem;color:var(--dblog-text-secondary);">邮箱</label>
              <div v-if="!editing" class="py-2" style="font-size:0.95rem;">{{ profile.email || '-' }}</div>
              <input v-else type="text" class="form-control" v-model="editForm.email" placeholder="输入邮箱地址">
            </div>
          </div>
          <div v-if="editing" class="d-flex gap-2 mt-3">
            <button class="btn btn-dark btn-sm px-4 fw-semibold" @click="saveProfile">保存</button>
            <button class="btn btn-outline-secondary btn-sm px-4" @click="cancelEdit">取消</button>
          </div>
        </div>

        <!-- 我的文章 -->
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h3 class="fs-5 fw-bold mb-0">我的文章</h3>
          <div class="d-flex gap-2">
            <template v-if="selecting">
              <button class="btn btn-danger btn-sm" @click="openDeleteModal">删除已选 ({{ selectedCount }})</button>
              <button class="btn btn-outline-secondary btn-sm" @click="cancelSelecting">取消</button>
            </template>
            <button v-else class="btn btn-outline-danger btn-sm" @click="startSelecting" v-if="posts.length > 0">批量删除</button>
          </div>
        </div>

        <!-- 文章列表 -->
        <div v-if="posts.length === 0" class="text-center text-secondary py-5">还没有发布过文章</div>
        <div v-else class="post-list">
          <post-card v-for="p in posts" :key="p.pid" :post="p">
            <template #before>
              <input type="checkbox" v-if="selecting" :value="p.pid" @change="toggleCheck(p.pid)"
                     style="width:18px;height:18px;margin-top:2px;flex-shrink:0;accent-color:#dc2626;cursor:pointer;">
            </template>
            <template #meta-after>
              <span class="status-tag ms-2" :class="'status-' + p.status">{{ statusMap[p.status] || p.status }}</span>
            </template>
            <template #footer></template>
          </post-card>
        </div>

      </div>
    </div>
  </div>

  <!-- ═══ Toast ═══ -->
  <div v-if="toastVisible" class="position-fixed top-0 start-50 translate-middle-x mt-3 z-3 bg-success"
       style="color:#fff;padding:10px 24px;border-radius:8px;font-size:0.88rem;box-shadow:0 4px 16px rgba(0,0,0,.15);">
    {{ toastMsg }}
  </div>

  <!-- ═══ 删除确认弹窗 ═══ -->
  <div v-if="showDeleteModal" class="modal-backdrop fade show" @click="showDeleteModal = false"></div>
  <div class="modal fade" :class="{ 'show d-block': showDeleteModal }" tabindex="-1" @click.self="showDeleteModal = false">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 rounded-4 shadow-lg">
        <div class="modal-header border-0 px-4 pt-4">
          <h2 class="modal-title fs-5 fw-bold">确认删除</h2>
          <button type="button" class="btn-close" @click="showDeleteModal = false"></button>
        </div>
        <div class="modal-body px-4 pb-4">
          <p class="text-danger fw-semibold mb-3" style="font-size:0.92rem;">已选择 {{ selectedCount }} 篇文章，确认要删除吗？</p>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:0.85rem;">请输入密码以确认</label>
            <input type="password" class="form-control" v-model="deletePassword" placeholder="输入登录密码">
          </div>
          <div v-if="deleteError" class="text-danger mb-3" style="font-size:0.8rem;">{{ deleteError }}</div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary flex-grow-1" @click="showDeleteModal = false">取消</button>
            <button class="btn btn-danger flex-grow-1 fw-semibold" @click="confirmDelete" :disabled="deleting">
              {{ deleting ? '删除中...' : '确认删除' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<!-- DBlog 通用博客卡片组件 -->
<script src="/js/post-card.js"></script>
<!-- DBlog 个人主页逻辑 -->
<script src="/js/profile.js"></script>

</body>
</html>
