<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程作业 - 星码记</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9733;</text></svg>">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- 星码记 自定义 -->
  <link href="/css/index.css" rel="stylesheet">
  <!-- 星码记 主题切换（尽早加载防止闪烁） -->
  <script src="/js/theme.js"></script>
</head>
<body>

<!-- ═══ 顶部导航 ═══ -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-xl px-3">
    <a class="navbar-brand" href="/">
      <span class="brand-icon">&#9733;</span> 星码记
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
        <li class="nav-item"><a class="nav-link" href="/posts.html">所有文章</a></li>
        <li class="nav-item dropdown nav-dropdown">
          <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">课程作业</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/course.html?name=操作系统原理">操作系统原理</a></li>
            <li><a class="dropdown-item" href="/course.html?name=计算机网络">计算机网络</a></li>
            <li><a class="dropdown-item" href="/course.html?name=数据库组成原理">数据库组成原理</a></li>
          </ul>
        </li>
      </ul>
      <button class="theme-toggle" id="themeToggle" title="切换主题">
        <i class="bi bi-sun" id="themeSun"></i>
        <i class="bi bi-moon" id="themeMoon" style="display:none;"></i>
      </button>
      <div class="search-box" id="searchBox">
        <button class="search-toggle" id="searchToggle"><i class="bi bi-search"></i></button>
        <form class="search-form" id="searchForm" onsubmit="return false;">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索文章..." autocomplete="off">
        </form>
      </div>
    </div>
  </div>
</nav>

<div id="app">

  <!-- ═══ 主体 ═══ -->
  <div class="container-xl px-3 py-4">
    <div class="section-header mb-4">
      <h2 class="section-title">{{ courseName }}</h2>
    </div>

    <div class="course-content">
      <div class="text-center py-5" style="color:var(--dblog-text-secondary);">
        <i class="bi bi-book" style="font-size:3rem;opacity:0.3;"></i>
        <p class="mt-3" style="font-size:0.95rem;">暂无内容</p>
      </div>
    </div>
  </div>

  <!-- ═══ 页脚 ═══ -->
  <footer class="text-center py-3" style="font-size:0.78rem;color:var(--dblog-text-secondary);">
    &copy; 2026 星码记
  </footer>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp, ref, computed } = Vue;

createApp({
  setup() {
    const params = new URLSearchParams(window.location.search);
    const courseName = ref(params.get('name') || '课程作业');
    document.title = courseName.value + ' - 星码记';

    // 高亮当前选中的下拉项
    const activeItem = document.querySelector(
      '.dropdown-item[href="' + window.location.pathname + window.location.search + '"]'
    );
    if (activeItem) activeItem.classList.add('active');

    return { courseName };
  }
}).mount('#app');
</script>
<!-- 星码记 搜索交互 -->
<script src="/js/search.js"></script>

<div class="icp-footer">
  <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">蜀ICP备2026025849号</a>
</div>

</body>
</html>
